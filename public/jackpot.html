<!doctype html>
<html lang="es" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jackpot - Grand Prix</title>
    <link rel="icon" href="/favicon.png" type="image/png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Outfit:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; }

      :root {
        --bg: #0f0f1a;
        --bg2: #1a1a2e;
        --text: #f0e6d2;
        --gold: #ffd700;
        --gold-dark: #b8860b;
        --red-hot: #ff2020;
        --red-glow: #ff4444;
        --green-neon: #00ff88;
      }

      html, body { min-height: 100vh; }

      body {
        font-family: "Space Grotesk", sans-serif;
        background: var(--bg);
        color: var(--text);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem 1rem;
        overflow-x: hidden;
        background-image:
          radial-gradient(ellipse at 50% 0%, rgba(255,215,0,0.08) 0%, transparent 60%),
          radial-gradient(ellipse at 50% 100%, rgba(255,32,32,0.06) 0%, transparent 50%);
      }

      h1, h2 { font-family: "Outfit", sans-serif; }

      /* ── Back link ── */
      .back-link {
        position: fixed;
        top: 1.5rem;
        left: 1.5rem;
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        color: var(--gold);
        text-decoration: none;
        font-weight: 600;
        font-size: 0.9rem;
        opacity: 0.8;
        transition: opacity 200ms;
        z-index: 10;
      }
      .back-link:hover { opacity: 1; }
      .back-link svg { width: 18px; height: 18px; }

      /* ── Header ── */
      .jp-header {
        text-align: center;
        margin-bottom: 2rem;
      }
      .jp-logo {
        height: 140px;
        margin-bottom: 0.5rem;
        filter: drop-shadow(0 6px 30px rgba(255,215,0,0.35));
        animation: jp-dance 2.5s ease-in-out infinite;
      }

      @keyframes jp-dance {
        0%, 100% { transform: translateY(0) rotate(0deg) scale(1); }
        10%  { transform: translateY(-4px) rotate(-2deg) scale(1.02); }
        20%  { transform: translateY(0) rotate(0deg) scale(1); }
        30%  { transform: translateY(-3px) rotate(2.5deg) scale(1.01); }
        40%  { transform: translateY(1px) rotate(0deg) scale(1); }
        50%  { transform: translateY(-5px) rotate(-1.5deg) scale(1.03); }
        60%  { transform: translateY(0) rotate(1deg) scale(1); }
        70%  { transform: translateY(-3px) rotate(-2deg) scale(1.02); }
        80%  { transform: translateY(1px) rotate(0.5deg) scale(1); }
        90%  { transform: translateY(-2px) rotate(-1deg) scale(1.01); }
      }

      /* ── Falling coins ── */
      .coins-container {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        overflow: hidden;
        -webkit-mask-image: linear-gradient(to bottom, black 0%, black 55%, transparent 92%);
        mask-image: linear-gradient(to bottom, black 0%, black 55%, transparent 92%);
      }

      /* Moneda cayendo */
      .coin {
        position: absolute;
        top: -60px;
        width: var(--coin-size, 36px);
        height: var(--coin-size, 36px);
        animation: coin-fall var(--coin-duration, 6s) linear infinite;
        animation-delay: var(--coin-delay, 0s);
      }

      /* Contenedor de los 3 frames apilados */
      .coin-frames {
        position: relative;
        width: 100%;
        height: 100%;
        filter: drop-shadow(0 2px 8px rgba(255,215,0,0.45));
      }

      .coin-frame {
        position: absolute;
        inset: 0;
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center;
        opacity: 0;
        animation: none;
      }

      .coin-f1 {
        background-image: url("/monedafront.png");
        animation: frame-front var(--coin-spin-dur, 1.6s) steps(1) infinite;
        animation-delay: var(--coin-delay, 0s);
      }
      .coin-f2 {
        background-image: url("/monedafinal.png");
        animation: frame-quarter var(--coin-spin-dur, 1.6s) steps(1) infinite;
        animation-delay: var(--coin-delay, 0s);
      }
      .coin-f3 {
        background-image: url("/monedaside.png");
        animation: frame-side var(--coin-spin-dur, 1.6s) steps(1) infinite;
        animation-delay: var(--coin-delay, 0s);
      }

      /* Secuencia: front(0-30%) → 3/4(30-45%) → side(45-55%) → 3/4 flip(55-70%) → front(70-100%) */
      @keyframes frame-front {
        0%   { opacity: 1; }
        30%  { opacity: 1; }
        30.01% { opacity: 0; }
        70%  { opacity: 0; }
        70.01% { opacity: 1; }
        100% { opacity: 1; }
      }

      @keyframes frame-quarter {
        0%   { opacity: 0; }
        30%  { opacity: 0; }
        30.01% { opacity: 1; transform: scaleX(1); }
        45%  { opacity: 1; transform: scaleX(1); }
        45.01% { opacity: 0; }
        55%  { opacity: 0; }
        55.01% { opacity: 1; transform: scaleX(-1); }
        70%  { opacity: 1; transform: scaleX(-1); }
        70.01% { opacity: 0; }
        100% { opacity: 0; }
      }

      @keyframes frame-side {
        0%   { opacity: 0; }
        45%  { opacity: 0; }
        45.01% { opacity: 1; }
        55%  { opacity: 1; }
        55.01% { opacity: 0; }
        100% { opacity: 0; }
      }

      @keyframes coin-fall {
        0%   { transform: translateY(-60px) rotateZ(0deg); opacity: 0; }
        4%   { opacity: 0.9; }
        82%  { opacity: 0.9; }
        100% { transform: translateY(105vh) rotateZ(var(--coin-wobble, 20deg)); opacity: 0; }
      }
      .jp-subtitle {
        color: #8888aa;
        font-size: 0.9rem;
        margin-top: 0.1rem;
      }

      /* ── Thermometer container ── */
      .thermo-wrap {
        position: relative;
        display: flex;
        align-items: flex-end;
        justify-content: center;
        gap: 0;
        width: 100%;
        max-width: 420px;
      }

      /* ── Tick marks on the left ── */
      .thermo-ticks {
        position: relative;
        display: flex;
        flex-direction: column-reverse;
        justify-content: space-between;
        height: 480px;
        padding-bottom: 46px;
        padding-top: 14px;
        margin-right: -6px;
        z-index: 3;
      }

      .tick {
        display: flex;
        align-items: center;
        gap: 0.35rem;
        font-family: "Outfit", sans-serif;
        font-weight: 700;
        font-size: 0.82rem;
        color: #556;
        transition: color 600ms, text-shadow 600ms;
      }
      .tick.is-reached {
        color: var(--gold);
        text-shadow: 0 0 12px rgba(255,215,0,0.4);
      }
      .tick-line {
        width: 18px;
        height: 2px;
        background: #333;
        border-radius: 2px;
        transition: background 600ms;
      }
      .tick.is-reached .tick-line {
        background: var(--gold-dark);
      }

      /* ── Tube ── */
      .thermo-tube {
        position: relative;
        width: 72px;
        height: 480px;
        z-index: 2;
      }

      .tube-bg {
        position: absolute;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 52px;
        height: 100%;
        border-radius: 30px 30px 0 0;
        background: var(--bg2);
        border: 3px solid #2a2a44;
        box-shadow:
          inset 0 0 20px rgba(0,0,0,0.5),
          0 0 30px rgba(0,0,0,0.3);
        overflow: hidden;
      }

      .tube-fill {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 0%;
        background: linear-gradient(0deg,
          #4fc3f7 0%,
          #29b6f6 8%,
          #7c4dff 20%,
          #e040fb 32%,
          #ff4081 44%,
          #ff1744 56%,
          #ff5722 68%,
          #ff9100 78%,
          #ffab00 88%,
          #ffd700 100%
        );
        border-radius: 26px 26px 0 0;
        transition: height 2s cubic-bezier(0.22, 0.61, 0.36, 1);
        box-shadow:
          0 0 20px rgba(255,32,32,0.4),
          inset 0 0 15px rgba(255,255,255,0.15);
      }

      .tube-fill::after {
        content: "";
        position: absolute;
        top: 0;
        left: 8px;
        width: 8px;
        height: 60%;
        background: linear-gradient(180deg, rgba(255,255,255,0.35), transparent);
        border-radius: 8px;
      }

      /* Bubbles */
      .tube-fill .bubble {
        position: absolute;
        border-radius: 50%;
        background: rgba(255,255,255,0.15);
        animation: bubble-rise 3s ease-in infinite;
      }

      @keyframes bubble-rise {
        0%   { transform: translateY(0) scale(1); opacity: 0.6; }
        100% { transform: translateY(-120px) scale(0.3); opacity: 0; }
      }

      /* Glow ring at top of fill */
      .tube-glow {
        position: absolute;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 60px;
        height: 12px;
        border-radius: 50%;
        background: #4fc3f7;
        filter: blur(8px);
        opacity: 0.6;
        transition: bottom 2s cubic-bezier(0.22, 0.61, 0.36, 1), background 2s;
      }

      /* ── Bulb ── */
      .thermo-bulb {
        position: absolute;
        bottom: -42px;
        left: 50%;
        transform: translateX(-50%);
        width: 90px;
        height: 90px;
        border-radius: 50%;
        background: radial-gradient(circle at 38% 38%, #64b5f6, #1565c0 70%);
        border: 3px solid #2a2a44;
        box-shadow:
          0 0 40px rgba(79,195,247,0.5),
          0 0 80px rgba(79,195,247,0.2),
          inset 0 0 20px rgba(0,0,0,0.3);
        z-index: 3;
        transition: background 2s, box-shadow 2s;
      }

      .thermo-bulb.is-warm {
        background: radial-gradient(circle at 38% 38%, #e040fb, #9c27b0 70%);
        box-shadow: 0 0 40px rgba(224,64,251,0.5), 0 0 80px rgba(224,64,251,0.2), inset 0 0 20px rgba(0,0,0,0.3);
      }
      .thermo-bulb.is-hot {
        background: radial-gradient(circle at 38% 38%, #ff6644, #cc1100 70%);
        box-shadow: 0 0 40px rgba(255,32,32,0.5), 0 0 80px rgba(255,32,32,0.2), inset 0 0 20px rgba(0,0,0,0.3);
        animation: pulse-glow 1.5s ease-in-out infinite;
      }
      .thermo-bulb.is-fire {
        background: radial-gradient(circle at 38% 38%, #ffd700, #ff8c00 70%);
        box-shadow: 0 0 50px rgba(255,215,0,0.6), 0 0 100px rgba(255,215,0,0.3), inset 0 0 20px rgba(0,0,0,0.3);
        animation: pulse-glow 1s ease-in-out infinite;
      }

      .thermo-bulb::after {
        content: "";
        position: absolute;
        top: 14px;
        left: 18px;
        width: 22px;
        height: 22px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(255,255,255,0.45), transparent 70%);
      }

      /* ── Current amount display ── */
      .amount-display {
        position: relative;
        text-align: center;
        margin-top: 0.5rem;
      }

      .amount-label {
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.15em;
        color: #8888aa;
        font-weight: 600;
      }

      .amount-value {
        font-family: "Outfit", sans-serif;
        font-size: 3.8rem;
        font-weight: 800;
        line-height: 1.1;
        background: linear-gradient(180deg, #fff 0%, #ffd700 50%, #ff8c00 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        transition: all 500ms;
      }

      .amount-pct {
        font-family: "Outfit", sans-serif;
        font-size: 1.1rem;
        font-weight: 700;
        color: var(--green-neon);
        margin-top: 0.2rem;
      }

      .amount-meta {
        margin-top: 0.5rem;
        font-size: 0.8rem;
        color: #666;
      }

      /* ── Pet mascot sitting ON the USD amount text ── */
      .goal-pet {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        bottom: calc(100% - 2.2rem);
        width: 140px;
        height: auto;
        z-index: 5;
        filter: drop-shadow(0 4px 16px rgba(255,215,0,0.5));
        animation: pet-idle 2s ease-in-out infinite;
        pointer-events: none;
      }

      @keyframes pet-idle {
        0%, 100% { transform: translateY(0) rotate(0deg); }
        25%  { transform: translateY(-4px) rotate(-2deg); }
        50%  { transform: translateY(-1px) rotate(1deg); }
        75%  { transform: translateY(-5px) rotate(-1deg); }
      }

      /* ── Confetti (hidden until goal) ── */
      .confetti-container {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 100;
        overflow: hidden;
        display: none;
      }
      .confetti-container.is-active { display: block; }

      .confetti {
        position: absolute;
        width: 10px;
        height: 10px;
        top: -20px;
        animation: confetti-fall 3s linear infinite;
      }

      @keyframes confetti-fall {
        0%   { transform: translateY(-10px) rotate(0deg); opacity: 1; }
        100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
      }

      /* ── Pulse animation when near goal ── */
      @keyframes pulse-glow {
        0%, 100% { box-shadow: 0 0 40px rgba(255,32,32,0.5), 0 0 80px rgba(255,32,32,0.2); }
        50%      { box-shadow: 0 0 60px rgba(255,215,0,0.7), 0 0 120px rgba(255,215,0,0.3); }
      }

      .thermo-bulb.is-hot {
        animation: pulse-glow 1.5s ease-in-out infinite;
      }

      /* ── Responsive ── */
      @media (max-width: 480px) {
        .jp-logo { height: 100px; }
        .thermo-tube { height: 380px; }
        .thermo-ticks { height: 380px; }
        .tick { font-size: 0.72rem; }
        .amount-value { font-size: 2.2rem; }
        .goal-pet { width: 100px; }
      }
    </style>
  </head>
  <body>
    <div class="coins-container" id="coinsContainer"></div>

    <a href="/" class="back-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      Grand Prix
    </a>

    <div class="jp-header">
      <img src="/Jackpotlogo.png" alt="Jackpot" class="jp-logo" />
    </div>

    <div class="thermo-wrap">
      <div class="thermo-ticks" id="thermoTicks"></div>

      <div class="thermo-tube">
        <div class="tube-bg">
          <div class="tube-fill" id="tubeFill">
            <span class="bubble" style="left:12px;bottom:10%;width:6px;height:6px;animation-delay:0s"></span>
            <span class="bubble" style="left:28px;bottom:20%;width:4px;height:4px;animation-delay:0.8s"></span>
            <span class="bubble" style="left:18px;bottom:5%;width:5px;height:5px;animation-delay:1.6s"></span>
          </div>
        </div>
        <div class="tube-glow" id="tubeGlow"></div>
        <div class="thermo-bulb" id="thermoBulb"></div>
      </div>
    </div>

    <div class="amount-display">
      <img src="/cdpet.png" alt="CD Pet" class="goal-pet" />
      <p class="amount-label">Acumulado del mes</p>
      <p class="amount-value" id="amountValue">$0</p>
      <p class="amount-pct" id="amountPct">0%</p>
      <p class="amount-meta" id="amountMeta"></p>
    </div>

    <div class="confetti-container" id="confetti"></div>

    <script>
      const GOAL = 9_000_000;
      const STEPS = [1_000_000, 2_000_000, 3_000_000, 4_000_000, 5_000_000, 6_000_000, 7_000_000, 8_000_000, 9_000_000];

      const tubeFill = document.getElementById("tubeFill");
      const tubeGlow = document.getElementById("tubeGlow");
      const thermoBulb = document.getElementById("thermoBulb");
      const amountValue = document.getElementById("amountValue");
      const amountPct = document.getElementById("amountPct");
      const amountMeta = document.getElementById("amountMeta");
      const jpMonth = document.getElementById("jpMonth"); // may be null
      const thermoTicks = document.getElementById("thermoTicks");
      const confettiEl = document.getElementById("confetti");

      function formatMoney(v) {
        return new Intl.NumberFormat("es-MX", {
          style: "currency", currency: "USD",
          minimumFractionDigits: 0, maximumFractionDigits: 0,
        }).format(v);
      }

      function formatMonthYear(v) {
        return new Intl.DateTimeFormat("es-MX", {
          year: "numeric", month: "long", timeZone: "UTC",
        }).format(new Date(v + "T00:00:00Z"));
      }

      // Build tick marks
      function buildTicks() {
        thermoTicks.innerHTML = STEPS.map((s) =>
          `<div class="tick" data-step="${s}">
            <span>$${s / 1_000_000}M</span>
            <span class="tick-line"></span>
          </div>`
        ).join("");
      }

      function updateTicks(amount) {
        thermoTicks.querySelectorAll(".tick").forEach((tick) => {
          const step = Number(tick.dataset.step);
          tick.classList.toggle("is-reached", amount >= step);
        });
      }

      function launchConfetti() {
        confettiEl.classList.add("is-active");
        const colors = ["#ffd700", "#ff2020", "#00ff88", "#ff44aa", "#44aaff", "#ffaa00"];
        for (let i = 0; i < 80; i++) {
          const c = document.createElement("div");
          c.className = "confetti";
          c.style.left = Math.random() * 100 + "%";
          c.style.background = colors[Math.floor(Math.random() * colors.length)];
          c.style.animationDelay = Math.random() * 3 + "s";
          c.style.animationDuration = (2 + Math.random() * 2) + "s";
          c.style.borderRadius = Math.random() > 0.5 ? "50%" : "2px";
          c.style.width = (6 + Math.random() * 8) + "px";
          c.style.height = (6 + Math.random() * 8) + "px";
          confettiEl.appendChild(c);
        }
      }

      // Animate the counter
      function animateCount(target, duration = 2000) {
        const start = performance.now();
        function tick(now) {
          const elapsed = now - start;
          const progress = Math.min(elapsed / duration, 1);
          const eased = 1 - Math.pow(1 - progress, 3);
          const current = Math.round(target * eased);
          amountValue.textContent = formatMoney(current);
          if (progress < 1) requestAnimationFrame(tick);
        }
        requestAnimationFrame(tick);
      }

      async function loadJackpot() {
        try {
          const res = await fetch("/api/jackpot");
          const data = await res.json();
          if (!res.ok) throw new Error(data.error);

          const { totalAmount, goal, month, totalDeals, activeAgents } = data;
          const pct = Math.min(totalAmount / goal, 1);

          if (jpMonth) jpMonth.textContent = formatMonthYear(month);
          amountPct.textContent = (pct * 100).toFixed(1) + "% del Jackpot";
          amountMeta.textContent = `${totalDeals} ventas/deals · ${activeAgents} vendedores`;

          // Fill thermometer with delay for visual effect
          setTimeout(() => {
            tubeFill.style.height = (pct * 100) + "%";
            tubeGlow.style.bottom = `calc(${pct * 100}% - 6px)`;
            // Glow color matches fill level
            if (pct >= 0.9) tubeGlow.style.background = "#ffd700";
            else if (pct >= 0.7) tubeGlow.style.background = "#ff9100";
            else if (pct >= 0.5) tubeGlow.style.background = "#ff1744";
            else if (pct >= 0.3) tubeGlow.style.background = "#e040fb";
            else tubeGlow.style.background = "#4fc3f7";
          }, 300);

          updateTicks(totalAmount);
          animateCount(totalAmount);

          // Bulb color stages
          thermoBulb.classList.remove("is-warm", "is-hot", "is-fire");
          if (pct >= 0.9) thermoBulb.classList.add("is-fire");
          else if (pct >= 0.6) thermoBulb.classList.add("is-hot");
          else if (pct >= 0.3) thermoBulb.classList.add("is-warm");

          // Dynamic coins — more coins as percentage rises
          updateCoinCount(pct);

          if (pct >= 1) launchConfetti();
        } catch (err) {
          console.error("Error loading jackpot:", err);
          if (jpMonth) jpMonth.textContent = "Error al cargar datos";
        }
      }

      // Theme from main page
      const theme = localStorage.getItem("theme") || "light";
      // Jackpot always dark for drama

      buildTicks();
      loadJackpot();

      // Auto refresh every 60s
      setInterval(loadJackpot, 60_000);

      // ── Falling coins (dynamic based on jackpot %) ──
      const coinsContainer = document.getElementById("coinsContainer");
      let currentCoinCount = 0;

      function createCoin() {
        const coin = document.createElement("div");
        coin.className = "coin";
        const size = 32 + Math.random() * 28;
        coin.style.setProperty("--coin-size", size + "px");
        coin.style.setProperty("--coin-duration", (6 + Math.random() * 7) + "s");
        coin.style.setProperty("--coin-delay", (Math.random() * 10) + "s");
        coin.style.setProperty("--coin-wobble", (8 + Math.random() * 25) + "deg");
        coin.style.setProperty("--coin-spin-dur", (1.2 + Math.random() * 1.4) + "s");
        coin.style.left = (Math.random() * 94 + 3) + "%";
        coin.innerHTML = `
          <div class="coin-frames">
            <div class="coin-frame coin-f1"></div>
            <div class="coin-frame coin-f2"></div>
            <div class="coin-frame coin-f3"></div>
          </div>`;
        return coin;
      }

      function updateCoinCount(pct) {
        // 0% → 5 coins, 50% → 18, 100% → 40
        const target = Math.round(5 + pct * 35);
        while (currentCoinCount < target) {
          coinsContainer.appendChild(createCoin());
          currentCoinCount++;
        }
        // Remove excess if somehow pct went down
        while (currentCoinCount > target && coinsContainer.lastChild) {
          coinsContainer.removeChild(coinsContainer.lastChild);
          currentCoinCount--;
        }
      }

      // Start with a minimum
      updateCoinCount(0);
    </script>
  </body>
</html>
