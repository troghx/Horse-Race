<!doctype html>
<html lang="es" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grand Prix</title>
    <link rel="icon" href="/favicon.png" type="image/png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Racing+Sans+One&family=Space+Grotesk:wght@400;500;700&family=Outfit:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css?v=20260313-prize-mode-2" />
  </head>
  <body>
    <main class="shell">

      <!-- Top bar -->
      <header class="topbar">
        <div class="topbar-left">
          <div class="brand-lockup">
            <div class="brand-title-row">
              <button class="brand-logo-btn" id="prizeModeButton" type="button" title="Activar prize mode" aria-pressed="false">
                <img src="/cd-logo.png" alt="Activar prize mode" class="brand-logo" />
              </button>
              <div class="brand-copy">
                <h1>Grand Prix</h1>
                <span class="brand-of">OF</span>
              </div>
            </div>
            <span class="topbar-stats" id="summaryCards" style="display:none"></span>
          </div>
        </div>
        <div class="topbar-center">
          <section class="podium" id="podium"></section>
        </div>
        <div class="topbar-right">
          <div class="topbar-launchers">
            <button class="jackpot-btn" id="jackpotButton" type="button" title="Jackpot">
              <img src="/Jackpotlogo.png" alt="Jackpot" class="jackpot-logo" />
            </button>
            <button class="jackpot-btn inbound-btn" id="inboundCompetitionButton" type="button" title="Inbound Competition">
              <img src="/inbounds-competition.png" alt="Inbound Competition" class="jackpot-logo inbound-logo" />
            </button>
          </div>
          <div class="topbar-controls">
            <input id="anchorDate" type="date" class="date-input" />
          </div>
          <div class="topbar-actions">
            <button class="icon-btn" id="refreshButton" type="button" title="Actualizar">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.636-6.364"/><polyline points="21 3 21 9 15 9"/></svg>
            </button>
            <button class="icon-btn" id="themeToggle" type="button" title="Cambiar tema">
              <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
              <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            </button>
          </div>
          <div class="topbar-period">
            <div class="segmented" id="periodSwitcher">
              <button class="period-btn is-active" data-period="day">Dia</button>
              <button class="period-btn" data-period="week">Semana</button>
              <button class="period-btn" data-period="month">Mes</button>
            </div>
          </div>
          <div class="topbar-view">
            <div class="segmented" id="viewSwitcher" aria-label="Modo de vista">
              <button class="view-btn is-active" data-view="individual">Individual</button>
              <button class="view-btn" data-view="teams">Teams</button>
            </div>
          </div>
        </div>
      </header>

      <div class="status-marquee">
        <p class="range-note" id="rangeLabel"></p>
        <section class="news-ribbon" id="newsRibbon">
          <button class="news-ribbon-btn" id="tickerButton" type="button" title="Activa prize mode para editar las leyendas">
            <span class="news-ribbon-label">Ultima hora</span>
            <span class="news-ribbon-live" aria-hidden="true"></span>
            <span class="news-ribbon-viewport" aria-live="polite">
              <span class="news-ribbon-copy" id="tickerText">Cargando leyendas...</span>
            </span>
          </button>
        </section>
      </div>

      <!-- Main: track left + sidebar right -->
      <div class="main-layout">
        <section class="panel track-section">
          <div class="track" id="track">
            <div class="empty-state">Cargando posiciones...</div>
          </div>
        </section>

        <div class="sidebar">
          <!-- Leader banner -->
          <div class="leader-banner" id="leaderBanner">
            <p class="leader-banner-label">Escuderia puntera</p>
            <div class="leader-banner-main">Cargando...</div>
            <p class="leader-banner-meta">Esperando datos del corte</p>
          </div>

          <!-- Team standings -->
          <div class="sidebar-block">
            <div class="sidebar-head">
              <p class="eyebrow">Equipos</p>
              <button class="edit-btn" id="editTeamsBtn" type="button" title="Editar equipos">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg>
              </button>
            </div>
            <div class="team-cards" id="teamBar"></div>
          </div>

        </div>
      </div>

      <!-- Leaderboard -->
      <section class="panel leaderboard">
        <div class="leaderboard-head">
          <p class="eyebrow" id="leaderboardEyebrow">Clasificacion</p>
          <h2 id="leaderboardTitle">Tabla completa</h2>
        </div>
        <div class="table-wrap">
          <table>
            <thead id="leaderboardHead">
              <tr id="leaderboardHeadRow">
                <th>#</th>
                <th>Vendedor</th>
                <th>Equipo</th>
                <th>Ventas/Deals</th>
                <th>Deuda</th>
                <th>Gap</th>
              </tr>
            </thead>
            <tbody id="leaderboardBody">
              <tr><td colspan="6">Cargando...</td></tr>
            </tbody>
          </table>
        </div>
      </section>

    </main>

    <!-- Team editor modal -->
    <div class="modal-overlay" id="teamModal">
      <div class="modal-card">
        <div class="modal-top">
          <h2>Editar equipos</h2>
          <button class="icon-btn" id="closeModal" type="button" title="Cerrar">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <div class="team-editor" id="teamEditor"></div>
        <div class="modal-bottom">
          <button class="accent-btn" id="saveTeams" type="button">Guardar cambios</button>
        </div>
      </div>
    </div>

    <div class="modal-overlay" id="tickerModal">
      <div class="modal-card modal-card--compact">
        <div class="modal-top">
          <h2>Editar leyendas del ticker</h2>
          <button class="icon-btn" id="closeTickerModal" type="button" title="Cerrar">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <div class="ticker-editor" id="tickerEditor"></div>
        <div class="modal-bottom modal-bottom--split">
          <button class="ghost-btn" id="addTickerLine" type="button">Agregar linea</button>
          <button class="accent-btn" id="saveTickerLines" type="button">Guardar leyendas</button>
        </div>
      </div>
    </div>

    <script type="module" src="/app.js?v=20260313-prize-mode-2"></script>
  </body>
</html>
