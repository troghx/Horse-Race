<!doctype html>
<html lang="es" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grand Prix</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" sizes="any" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Outfit:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">

      <!-- Top bar -->
      <header class="topbar">
        <div class="topbar-left">
          <div class="brand-lockup">
            <div class="brand-title-row">
              <img src="/cd-logo.png" alt="Logo" class="brand-logo" />
              <h1>Grand Prix</h1>
              <div class="trophy-badge" aria-hidden="true">
                <svg class="trophy-icon" viewBox="0 0 64 64" fill="none">
                  <defs>
                    <linearGradient id="trophyGold" x1="14" y1="10" x2="50" y2="52" gradientUnits="userSpaceOnUse">
                      <stop offset="0" stop-color="#fff4b4" />
                      <stop offset="0.35" stop-color="#f7cf5f" />
                      <stop offset="0.7" stop-color="#d89b18" />
                      <stop offset="1" stop-color="#a96a05" />
                    </linearGradient>
                  </defs>
                  <path d="M22 10h20v7c0 6.5-2.5 11.6-7.6 15.3L32 34l-2.4-1.7C24.5 28.6 22 23.5 22 17v-7Z" fill="url(#trophyGold)" stroke="#9f6407" stroke-width="2" stroke-linejoin="round" />
                  <path d="M22 14H13c0 8.5 3.5 14 11 15" stroke="#c88a10" stroke-width="3" stroke-linecap="round" />
                  <path d="M42 14h9c0 8.5-3.5 14-11 15" stroke="#c88a10" stroke-width="3" stroke-linecap="round" />
                  <path d="M27 39h10" stroke="#b6780b" stroke-width="3" stroke-linecap="round" />
                  <path d="M25 44h14v5H25z" fill="url(#trophyGold)" stroke="#9f6407" stroke-width="2" stroke-linejoin="round" />
                  <path d="M21 51h22" stroke="#9f6407" stroke-width="3" stroke-linecap="round" />
                  <circle cx="43" cy="17" r="2.5" fill="#fff2ad" opacity="0.75" />
                </svg>
              </div>
            </div>
            <span class="topbar-stats" id="summaryCards">Cargando...</span>
          </div>
        </div>
        <div class="topbar-center">
          <section class="podium" id="podium"></section>
        </div>
        <div class="topbar-right">
          <div class="topbar-controls">
            <div class="segmented" id="periodSwitcher">
              <button class="period-btn is-active" data-period="day">Dia</button>
              <button class="period-btn" data-period="week">Semana</button>
              <button class="period-btn" data-period="month">Mes</button>
            </div>
            <input id="anchorDate" type="date" class="date-input" />
          </div>
          <div class="topbar-actions">
            <button class="icon-btn" id="refreshButton" type="button" title="Actualizar">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.636-6.364"/><polyline points="21 3 21 9 15 9"/></svg>
            </button>
            <button class="icon-btn" id="themeToggle" type="button" title="Cambiar tema">
              <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
              <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            </button>
          </div>
        </div>
      </header>

      <p class="range-note" id="rangeLabel"></p>

      <!-- Main: track left + sidebar right -->
      <div class="main-layout">
        <section class="panel track-section">
          <div class="track" id="track">
            <div class="empty-state">Cargando posiciones...</div>
          </div>
        </section>

        <div class="sidebar">
          <!-- Leader banner -->
          <div class="leader-banner" id="leaderBanner">
            <p class="leader-banner-label">Escuderia puntera</p>
            <div class="leader-banner-main">Cargando...</div>
            <p class="leader-banner-meta">Esperando datos del corte</p>
          </div>

          <!-- Team standings -->
          <div class="sidebar-block">
            <div class="sidebar-head">
              <p class="eyebrow">Equipos</p>
              <button class="edit-btn" id="editTeamsBtn" type="button" title="Editar equipos">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg>
              </button>
            </div>
            <div class="team-cards" id="teamBar"></div>
          </div>

        </div>
      </div>

      <!-- Leaderboard -->
      <section class="panel leaderboard">
        <div class="leaderboard-head">
          <p class="eyebrow">Clasificacion</p>
          <h2>Tabla completa</h2>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>Vendedor</th>
                <th>Equipo</th>
                <th>Registros</th>
                <th>Deuda</th>
                <th>Gap</th>
              </tr>
            </thead>
            <tbody id="leaderboardBody">
              <tr><td colspan="6">Cargando...</td></tr>
            </tbody>
          </table>
        </div>
      </section>

    </main>

    <!-- Team editor modal -->
    <div class="modal-overlay" id="teamModal">
      <div class="modal-card">
        <div class="modal-top">
          <h2>Editar equipos</h2>
          <button class="icon-btn" id="closeModal" type="button" title="Cerrar">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <div class="team-editor" id="teamEditor"></div>
        <div class="modal-bottom">
          <button class="accent-btn" id="saveTeams" type="button">Guardar cambios</button>
        </div>
      </div>
    </div>

    <script type="module" src="/app.js"></script>
  </body>
</html>
